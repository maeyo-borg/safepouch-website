# Netlify config for the SafePouch static site.
# No build step — these are plain HTML files served from the repo root.

[build]
  publish = "."
  command = ""

# Long cache for static images (they rarely change)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/BRAND_ASSETS/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Basic security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
